name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install flake8

      - name: flake8 (fatal errors)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=__pycache__,.git,web/static

      - name: flake8 (style)
        run: flake8 . --count --max-line-length=120 --statistics --exclude=__pycache__,.git,web/static --ignore=E501,W503,E203,E266,E741,E127,E226,E302,E303,E402,F541

  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Syntax check all .py files
        run: python -m py_compile main.py pipeline_logging.py cbl_store.py rest/output_http.py schema/mapper.py schema/validator.py

      - name: Run tests
        run: pytest tests/ -v --tb=short
