services:
  changes-worker:
    build: .
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - cbl-data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  admin-ui:
    build: .
    entrypoint: ["python", "web/server.py"]
    command: ["--port", "8080"]
    ports:
      - "8080:8080"
    environment:
      - METRICS_HOST=changes-worker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - cbl-data:/app/data
    restart: unless-stopped

volumes:
  cbl-data:
