<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Changes Worker -- Config Editor</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link href="/static/css/daisyui.css" rel="stylesheet" type="text/css" />
  <link href="/static/css/themes.css" rel="stylesheet" type="text/css" />
  <link href="/static/css/tagify.css" rel="stylesheet" type="text/css" />
  <script src="/static/js/tailwind.js"></script>
  <script src="/static/js/tagify.min.js"></script>
  <script>
    (function(){
      var t = localStorage.getItem('cw_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body class="min-h-screen flex flex-col bg-base-200">

  <!-- Navbar -->
  <nav class="navbar bg-base-100 shadow-sm px-4">
    <div class="flex-1">
      <a href="/" class="text-xl font-bold">Changes Worker Admin</a>
    </div>
    <div class="flex-none">
      <ul class="menu menu-horizontal px-1 gap-1">
        <li><a href="/">Dashboard</a></li>
        <li><a href="/config" class="active">Config</a></li>
        <li><a href="/schema">Schema Mappings</a></li>
        <li><a href="/transforms">Transforms</a></li>
        </ul>
      <label class="label cursor-pointer gap-2 ml-4">
        <span class="label-text text-sm">Dark</span>
        <input type="checkbox" id="themeToggle" class="toggle toggle-sm" />
        <span class="label-text text-sm">Light</span>
      </label>
    </div>
  </nav>

  <!-- Main content -->
  <main class="flex-1 container mx-auto p-6 max-w-4xl">
    <h1 class="text-2xl font-bold mb-4">Configuration Editor</h1>

    <!-- Tabs: Form / Raw JSON -->
    <div role="tablist" class="tabs tabs-bordered mb-4">
      <a role="tab" class="tab tab-active" id="tabForm" onclick="switchTab('form')">Form Editor</a>
      <a role="tab" class="tab" id="tabRaw" onclick="switchTab('raw')">Raw JSON</a>
    </div>

    <!-- Form View -->
    <div id="viewForm">

      <!-- Gateway -->
      <div class="collapse collapse-arrow bg-base-100 mb-2">
        <input type="checkbox" checked />
        <div class="collapse-title font-semibold">Gateway</div>
        <div class="collapse-content flex flex-col gap-3">
          <label class="form-control w-full">
            <div class="label"><span class="label-text">Source Type</span></div>
            <select id="gateway_src" class="select select-bordered w-full">
              <option value="sync_gateway">sync_gateway</option>
              <option value="app_services">app_services</option>
              <option value="edge_server">edge_server</option>
            </select>
          </label>
          <label class="form-control w-full">
            <div class="label"><span class="label-text">URL</span></div>
            <input type="text" id="gateway_url" class="input input-bordered w-full" placeholder="http://localhost:4984" />
          </label>
          <label class="form-control w-full">
            <div class="label"><span class="label-text">Database</span></div>
            <input type="text" id="gateway_database" class="input input-bordered w-full" />
          </label>
          <label class="form-control w-full">
            <div class="label"><span class="label-text">Scope</span></div>
            <input type="text" id="gateway_scope" class="input input-bordered w-full" />
          </label>
          <label class="form-control w-full">
            <div class="label"><span class="label-text">Collection</span></div>
            <input type="text" id="gateway_collection" class="input input-bordered w-full" />
          </label>
          <div class="form-control">
            <label class="label cursor-pointer justify-start gap-4">
              <span class="label-text">Accept self-signed certs</span>
              <input type="checkbox" id="gateway_accept_self_signed_certs" class="toggle toggle-success" />
            </label>
          </div>
        </div>
      </div>

      <!-- Auth -->
      <div class="collapse collapse-arrow bg-base-100 mb-2">
        <input type="checkbox" checked />
        <div class="collapse-title font-semibold">Auth</div>
        <div class="collapse-content flex flex-col gap-3">
          <label class="form-control w-full">
            <div class="label"><span class="label-text">Method</span></div>
            <select id="auth_method" class="select select-bordered w-full" onchange="toggleAuthFields()">
              <option value="basic">basic</option>
              <option value="session">session</option>
              <option value="bearer">bearer</option>
              <option value="none">none</option>
            </select>
          </label>
          <div id="auth_basic_fields">
            <label class="form-control w-full mb-3">
              <div class="label"><span class="label-text">Username</span></div>
              <input type="text" id="auth_username" class="input input-bordered w-full" />
            </label>
            <label class="form-control w-full">
              <div class="label"><span class="label-text">Password</span></div>
              <input type="password" id="auth_password" class="input input-bordered w-full" />
            </label>
          </div>
          <div id="auth_session_fields" class="hidden">
            <label class="form-control w-full">
              <div class="label"><span class="label-text">Session Cookie</span></div>
              <input type="text" id="auth_session_cookie" class="input input-bordered w-full" />
            </label>
          </div>
          <div id="auth_bearer_fields" class="hidden">
            <label class="form-control w-full">
              <div class="label"><span class="label-text">Bearer Token</span></div>
              <input type="text" id="auth_bearer_token" class="input input-bordered w-full" />
            </label>
          </div>
        </div>
      </div>

      <!-- Changes Feed -->
      <div class="collapse collapse-arrow bg-base-100 mb-2">
        <input type="checkbox" checked />
        <div class="collapse-title font-semibold">Changes Feed</div>
        <div class="collapse-content flex flex-col gap-3">
          <label class="form-control w-full">
            <div class="label">
              <span class="label-text flex items-center gap-2">
                Feed Type
                <div class="tooltip tooltip-right" data-tip="Polling: longpoll (default) – periodic HTTP requests with server-side wait; normal – immediate response, no server wait. &#10;&#10;Continuous: continuous – 2-phase catch-up then real-time HTTP stream; websocket – persistent bi-directional connection, client sends config once then receives changes pushed in real-time (SG &amp; App Services only); SSE – Server-Sent Events (Edge Server only).">
                  <span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-base-content text-base-100 text-xs font-bold cursor-help">?</span>
                </div>
              </span>
            </div>
            <select id="changes_feed_feed_type" class="select select-bordered w-full">
              <optgroup label="Polling">
                <option value="longpoll">longpoll</option>
                <option value="normal">normal</option>
              </optgroup>
              <optgroup label="Continuous">
                <option value="continuous">continuous</option>
                <option value="websocket">websocket (SG / App Services only)</option>
                <option value="sse">sse (Edge Server only)</option>
              </optgroup>
            </select>
          </label>
          <label class="form-control w-full">
            <div class="label"><span class="label-text">Poll Interval (seconds)</span></div>
            <input type="number" id="changes_feed_poll_interval_seconds" class="input input-bordered w-full" min="0" />
          </label>
          <div class="form-control">
            <label class="label cursor-pointer justify-start gap-4">
              <span class="label-text">Active Only</span>
              <input type="checkbox" id="changes_feed_active_only" class="toggle toggle-success" />
            </label>
          </div>
          <div class="form-control">
            <label class="label cursor-pointer justify-start gap-4">
              <span class="label-text">Include Docs</span>
              <input type="checkbox" id="changes_feed_include_docs" class="toggle toggle-success" />
            </label>
          </div>
          <label class="form-control w-full">
            <div class="label"><span class="label-text">Channels</span></div>
            <input type="text" id="changes_feed_channels" class="input input-bordered w-full" placeholder="Type a channel and press Enter" />
          </label>
          <label class="form-control w-full">
            <div class="label"><span class="label-text">Throttle Feed</span></div>
            <input type="number" id="changes_feed_throttle_feed" class="input input-bordered w-full" min="0" />
          </label>
          <label class="form-control w-full">
            <div class="label"><span class="label-text">HTTP Timeout (seconds)</span></div>
            <input type="number" id="changes_feed_http_timeout_seconds" class="input input-bordered w-full" min="0" />
          </label>
        </div>
      </div>

      <!-- Processing -->
      <div class="collapse collapse-arrow bg-base-100 mb-2">
        <input type="checkbox" checked />
        <div class="collapse-title font-semibold">Processing</div>
        <div class="collapse-content flex flex-col gap-3">
          <div class="form-control">
            <label class="label cursor-pointer justify-start gap-4">
              <span class="label-text">Ignore Delete</span>
              <input type="checkbox" id="processing_ignore_delete" class="toggle toggle-success" />
            </label>
          </div>
          <div class="form-control">
            <label class="label cursor-pointer justify-start gap-4">
              <span class="label-text">Ignore Remove</span>
              <input type="checkbox" id="processing_ignore_remove" class="toggle toggle-success" />
            </label>
          </div>
          <div class="form-control">
            <label class="label cursor-pointer justify-start gap-4">
              <span class="label-text">Sequential</span>
              <input type="checkbox" id="processing_sequential" class="toggle toggle-success" />
            </label>
          </div>
          <label class="form-control w-full">
            <div class="label"><span class="label-text">Max Concurrent</span></div>
            <input type="number" id="processing_max_concurrent" class="input input-bordered w-full" min="1" />
          </label>
          <div class="form-control">
            <label class="label cursor-pointer justify-start gap-4">
              <span class="label-text">Dry Run</span>
              <input type="checkbox" id="processing_dry_run" class="toggle toggle-success" />
            </label>
          </div>
        </div>
      </div>

      <!-- Output -->
      <div class="collapse collapse-arrow bg-base-100 mb-2">
        <input type="checkbox" checked />
        <div class="collapse-title font-semibold">Output</div>
        <div class="collapse-content flex flex-col gap-3">
          <label class="form-control w-full">
            <div class="label"><span class="label-text">Mode</span></div>
            <select id="output_mode" class="select select-bordered w-full" onchange="toggleOutputFields()">
              <option value="stdout">stdout</option>
              <option value="http">http</option>
              <option value="db">db</option>
            </select>
          </label>

          <!-- HTTP-specific fields -->
          <div id="output_http_fields">
            <label class="form-control w-full mb-3">
              <div class="label"><span class="label-text">Target URL</span></div>
              <input type="text" id="output_target_url" class="input input-bordered w-full" placeholder="https://example.com/webhook" />
            </label>
            <label class="form-control w-full">
              <div class="label"><span class="label-text">Output Format</span></div>
              <select id="output_output_format" class="select select-bordered w-full">
                <option value="json">json</option>
                <option value="xml">xml</option>
                <option value="form">form</option>
                <option value="msgpack">msgpack</option>
                <option value="cbor">cbor</option>
                <option value="bson">bson</option>
                <option value="yaml">yaml</option>
              </select>
            </label>
          </div>

          <!-- DB-specific fields -->
          <div id="output_db_fields" class="hidden">
            <label class="form-control w-full mb-3">
              <div class="label"><span class="label-text">Engine</span></div>
              <select id="output_db_engine" class="select select-bordered w-full">
                <option value="postgres">PostgreSQL</option>
                <option value="mysql">MySQL</option>
                <option value="mssql">MS SQL Server</option>
                <option value="oracle">Oracle</option>
              </select>
            </label>
            <div class="grid grid-cols-2 gap-3 mb-3">
              <label class="form-control w-full">
                <div class="label"><span class="label-text">Host</span></div>
                <input type="text" id="output_db_host" class="input input-bordered w-full" placeholder="localhost" />
              </label>
              <label class="form-control w-full">
                <div class="label"><span class="label-text">Port</span></div>
                <input type="number" id="output_db_port" class="input input-bordered w-full" min="1" max="65535" />
              </label>
            </div>
            <label class="form-control w-full mb-3">
              <div class="label"><span class="label-text">Database</span></div>
              <input type="text" id="output_db_database" class="input input-bordered w-full" placeholder="mydb" />
            </label>
            <div class="grid grid-cols-2 gap-3 mb-3">
              <label class="form-control w-full">
                <div class="label"><span class="label-text">Username</span></div>
                <input type="text" id="output_db_username" class="input input-bordered w-full" />
              </label>
              <label class="form-control w-full">
                <div class="label"><span class="label-text">Password</span></div>
                <input type="password" id="output_db_password" class="input input-bordered w-full" />
              </label>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-3">
              <label class="form-control w-full">
                <div class="label"><span class="label-text">Schema</span></div>
                <input type="text" id="output_db_schema" class="input input-bordered w-full" placeholder="public" />
              </label>
              <label class="form-control w-full">
                <div class="label"><span class="label-text">Table (fallback)</span></div>
                <input type="text" id="output_db_table" class="input input-bordered w-full" placeholder="couchbase_docs" />
              </label>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-3">
              <label class="form-control w-full">
                <div class="label"><span class="label-text">Pool Size</span></div>
                <input type="number" id="output_db_pool_size" class="input input-bordered w-full" min="1" value="5" />
              </label>
              <label class="form-control w-full">
                <div class="label"><span class="label-text">Connect Timeout (s)</span></div>
                <input type="number" id="output_db_connect_timeout" class="input input-bordered w-full" min="1" value="10" />
              </label>
            </div>
            <div class="form-control mb-3">
              <label class="label cursor-pointer justify-start gap-4">
                <span class="label-text">SSL</span>
                <input type="checkbox" id="output_db_ssl" class="toggle toggle-success" />
              </label>
            </div>

            <!-- Mapping sub-section -->
            <div class="divider text-xs opacity-60">Mapping</div>
            <label class="form-control w-full mb-3">
              <div class="label"><span class="label-text">Mapping Mode</span></div>
              <select id="output_db_mapping_mode" class="select select-bordered w-full" onchange="toggleDbMappingFields()">
                <option value="jsonb">jsonb (whole doc as JSON column)</option>
                <option value="columns">columns (map fields to columns)</option>
              </select>
            </label>

            <!-- JSONB mapping fields -->
            <div id="output_db_jsonb_fields">
              <div class="grid grid-cols-2 gap-3 mb-3">
                <label class="form-control w-full">
                  <div class="label"><span class="label-text">Doc ID Column</span></div>
                  <input type="text" id="output_db_doc_id_column" class="input input-bordered w-full" placeholder="doc_id" />
                </label>
                <label class="form-control w-full">
                  <div class="label"><span class="label-text">Rev Column</span></div>
                  <input type="text" id="output_db_rev_column" class="input input-bordered w-full" placeholder="rev" />
                </label>
              </div>
              <div class="grid grid-cols-2 gap-3">
                <label class="form-control w-full">
                  <div class="label"><span class="label-text">Body Column</span></div>
                  <input type="text" id="output_db_body_column" class="input input-bordered w-full" placeholder="body" />
                </label>
                <label class="form-control w-full">
                  <div class="label"><span class="label-text">Timestamp Column</span></div>
                  <input type="text" id="output_db_timestamp_column" class="input input-bordered w-full" placeholder="updated_at" />
                </label>
              </div>
            </div>

            <!-- Columns mapping fields (schema_mappings) -->
            <div id="output_db_columns_fields" class="hidden">
              <div class="form-control mb-3">
                <label class="label cursor-pointer justify-start gap-4">
                  <span class="label-text">Schema Mappings Enabled</span>
                  <input type="checkbox" id="output_db_schema_mappings_enabled" class="toggle toggle-success" checked />
                </label>
              </div>
              <label class="form-control w-full mb-3">
                <div class="label"><span class="label-text">Mappings Path</span></div>
                <input type="text" id="output_db_schema_mappings_path" class="input input-bordered w-full" placeholder="mappings/" />
              </label>
              <label class="form-control w-full mb-3">
                <div class="label"><span class="label-text">Default Mode (for unmapped doc types)</span></div>
                <select id="output_db_schema_mappings_default_mode" class="select select-bordered w-full">
                  <option value="jsonb">jsonb (store in fallback table)</option>
                  <option value="skip">skip (ignore unmapped docs)</option>
                </select>
              </label>
              <div class="form-control">
                <label class="label cursor-pointer justify-start gap-4">
                  <span class="label-text">Strict (reject unmapped docs)</span>
                  <input type="checkbox" id="output_db_schema_mappings_strict" class="toggle toggle-success" />
                </label>
              </div>
              <div class="mt-3">
                <a href="/schema" class="btn btn-sm btn-outline">Edit Schema Mappings →</a>
              </div>
            </div>
          </div>

          <div class="form-control">
            <label class="label cursor-pointer justify-start gap-4">
              <span class="label-text">Halt on Failure</span>
              <input type="checkbox" id="output_halt_on_failure" class="toggle toggle-success" />
            </label>
          </div>
        </div>
      </div>

      <!-- Checkpoint -->
      <div class="collapse collapse-arrow bg-base-100 mb-2">
        <input type="checkbox" checked />
        <div class="collapse-title font-semibold">Checkpoint</div>
        <div class="collapse-content flex flex-col gap-3">
          <div class="form-control">
            <label class="label cursor-pointer justify-start gap-4">
              <span class="label-text">Enabled</span>
              <input type="checkbox" id="checkpoint_enabled" class="toggle toggle-success" />
            </label>
          </div>
          <label class="form-control w-full">
            <div class="label"><span class="label-text">Client ID</span></div>
            <input type="text" id="checkpoint_client_id" class="input input-bordered w-full" />
          </label>
          <label class="form-control w-full">
            <div class="label"><span class="label-text">Every N Docs</span></div>
            <input type="number" id="checkpoint_every_n_docs" class="input input-bordered w-full" min="0" />
          </label>
        </div>
      </div>

      <!-- Metrics -->
      <div class="collapse collapse-arrow bg-base-100 mb-2">
        <input type="checkbox" checked />
        <div class="collapse-title font-semibold">Metrics</div>
        <div class="collapse-content flex flex-col gap-3">
          <div class="form-control">
            <label class="label cursor-pointer justify-start gap-4">
              <span class="label-text">Enabled</span>
              <input type="checkbox" id="metrics_enabled" class="toggle toggle-success" />
            </label>
          </div>
          <label class="form-control w-full">
            <div class="label"><span class="label-text">Host</span></div>
            <input type="text" id="metrics_host" class="input input-bordered w-full" />
          </label>
          <label class="form-control w-full">
            <div class="label"><span class="label-text">Port</span></div>
            <input type="number" id="metrics_port" class="input input-bordered w-full" min="1" max="65535" />
          </label>
        </div>
      </div>

      <!-- Logging -->
      <div class="collapse collapse-arrow bg-base-100 mb-2">
        <input type="checkbox" checked />
        <div class="collapse-title font-semibold">Logging</div>
        <div class="collapse-content flex flex-col gap-3">
          <label class="form-control w-full">
            <div class="label"><span class="label-text">Level</span></div>
            <select id="logging_level" class="select select-bordered w-full">
              <option value="DEBUG">DEBUG</option>
              <option value="INFO">INFO</option>
              <option value="WARNING">WARNING</option>
              <option value="ERROR">ERROR</option>
            </select>
          </label>
        </div>
      </div>

    </div><!-- /viewForm -->

    <!-- Raw JSON View -->
    <div id="viewRaw" class="hidden">
      <textarea id="rawJson" class="textarea textarea-bordered w-full font-mono text-sm" rows="30"></textarea>
    </div>

    <!-- Action Bar -->
    <div class="flex gap-3 mt-6 sticky bottom-4">
      <button class="btn btn-primary" onclick="saveConfig()">Save Config</button>
      <button class="btn btn-ghost" onclick="loadConfig()">Reset</button>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer footer-center p-4 bg-base-100 text-base-content">
    <p>Changes Worker v1.1.0</p>
  </footer>

  <!-- Toast container -->
  <div id="toastContainer" class="toast toast-end toast-bottom z-50"></div>

<script>
  // Theme toggle (persisted)
  var themeToggle = document.getElementById('themeToggle');
  themeToggle.checked = (localStorage.getItem('cw_theme') || 'dark') === 'light';
  themeToggle.addEventListener('change', function() {
    var theme = themeToggle.checked ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('cw_theme', theme);
  });

  // Tab switching
  function switchTab(tab) {
    var formView = document.getElementById('viewForm');
    var rawView = document.getElementById('viewRaw');
    var tabForm = document.getElementById('tabForm');
    var tabRaw = document.getElementById('tabRaw');
    if (tab === 'form') {
      formView.classList.remove('hidden');
      rawView.classList.add('hidden');
      tabForm.classList.add('tab-active');
      tabRaw.classList.remove('tab-active');
      try {
        var cfg = JSON.parse(document.getElementById('rawJson').value);
        populateForm(cfg);
      } catch(e) {}
    } else {
      formView.classList.add('hidden');
      rawView.classList.remove('hidden');
      tabRaw.classList.add('tab-active');
      tabForm.classList.remove('tab-active');
      document.getElementById('rawJson').value = JSON.stringify(collectConfig(), null, 2);
    }
  }

  // Auth field visibility
  function toggleAuthFields() {
    var method = document.getElementById('auth_method').value;
    document.getElementById('auth_basic_fields').classList.toggle('hidden', method !== 'basic');
    document.getElementById('auth_session_fields').classList.toggle('hidden', method !== 'session');
    document.getElementById('auth_bearer_fields').classList.toggle('hidden', method !== 'bearer');
  }

  // Output mode field visibility
  function toggleOutputFields() {
    var mode = document.getElementById('output_mode').value;
    document.getElementById('output_http_fields').classList.toggle('hidden', mode !== 'http');
    document.getElementById('output_db_fields').classList.toggle('hidden', mode !== 'db');
  }

  // DB mapping mode field visibility
  function toggleDbMappingFields() {
    var mode = document.getElementById('output_db_mapping_mode').value;
    document.getElementById('output_db_jsonb_fields').classList.toggle('hidden', mode !== 'jsonb');
    document.getElementById('output_db_columns_fields').classList.toggle('hidden', mode !== 'columns');
  }

  // Show toast
  function showToast(message, type) {
    var container = document.getElementById('toastContainer');
    var alertClass = type === 'success' ? 'alert-success' : 'alert-error';
    var toast = document.createElement('div');
    toast.className = 'alert ' + alertClass;
    toast.innerHTML = '<span>' + message + '</span>';
    container.appendChild(toast);
    setTimeout(function() { toast.remove(); }, 3000);
  }

  // Populate form from config object
  function populateForm(cfg) {
    document.getElementById('gateway_src').value = cfg.gateway?.src || 'sync_gateway';
    document.getElementById('gateway_url').value = cfg.gateway?.url || '';
    document.getElementById('gateway_database').value = cfg.gateway?.database || '';
    document.getElementById('gateway_scope').value = cfg.gateway?.scope || '';
    document.getElementById('gateway_collection').value = cfg.gateway?.collection || '';
    document.getElementById('gateway_accept_self_signed_certs').checked = cfg.gateway?.accept_self_signed_certs || false;

    document.getElementById('auth_method').value = cfg.auth?.method || 'none';
    document.getElementById('auth_username').value = cfg.auth?.username || '';
    document.getElementById('auth_password').value = cfg.auth?.password || '';
    document.getElementById('auth_session_cookie').value = cfg.auth?.session_cookie || '';
    document.getElementById('auth_bearer_token').value = cfg.auth?.bearer_token || '';
    toggleAuthFields();

    document.getElementById('changes_feed_feed_type').value = cfg.changes_feed?.feed_type || 'longpoll';
    document.getElementById('changes_feed_poll_interval_seconds').value = cfg.changes_feed?.poll_interval_seconds ?? 10;
    document.getElementById('changes_feed_active_only').checked = cfg.changes_feed?.active_only || false;
    document.getElementById('changes_feed_include_docs').checked = cfg.changes_feed?.include_docs || false;
    channelsTagify.removeAllTags();
    channelsTagify.addTags(cfg.changes_feed?.channels || []);
    document.getElementById('changes_feed_throttle_feed').value = cfg.changes_feed?.throttle_feed ?? 0;
    document.getElementById('changes_feed_http_timeout_seconds').value = cfg.changes_feed?.http_timeout_seconds ?? 300;

    document.getElementById('processing_ignore_delete').checked = cfg.processing?.ignore_delete || false;
    document.getElementById('processing_ignore_remove').checked = cfg.processing?.ignore_remove || false;
    document.getElementById('processing_sequential').checked = cfg.processing?.sequential || false;
    document.getElementById('processing_max_concurrent').value = cfg.processing?.max_concurrent ?? 20;
    document.getElementById('processing_dry_run').checked = cfg.processing?.dry_run || false;

    document.getElementById('output_mode').value = cfg.output?.mode || 'stdout';
    document.getElementById('output_target_url').value = cfg.output?.target_url || '';
    document.getElementById('output_output_format').value = cfg.output?.output_format || 'json';
    document.getElementById('output_halt_on_failure').checked = cfg.output?.halt_on_failure ?? true;

    // DB fields
    var db = cfg.output?.db || {};
    document.getElementById('output_db_engine').value = db.engine || 'postgres';
    document.getElementById('output_db_host').value = db.host || '';
    document.getElementById('output_db_port').value = db.port || '';
    document.getElementById('output_db_database').value = db.database || '';
    document.getElementById('output_db_username').value = db.username || '';
    document.getElementById('output_db_password').value = db.password || '';
    document.getElementById('output_db_schema').value = db.schema || '';
    document.getElementById('output_db_table').value = db.table || '';
    document.getElementById('output_db_pool_size').value = db.pool_size ?? 5;
    document.getElementById('output_db_connect_timeout').value = db.connect_timeout_seconds ?? 10;
    document.getElementById('output_db_ssl').checked = db.ssl || false;

    var mapping = db.mapping || {};
    document.getElementById('output_db_mapping_mode').value = mapping.mode || 'jsonb';
    document.getElementById('output_db_doc_id_column').value = mapping.doc_id_column || 'doc_id';
    document.getElementById('output_db_rev_column').value = mapping.rev_column || 'rev';
    document.getElementById('output_db_body_column').value = mapping.body_column || 'body';
    document.getElementById('output_db_timestamp_column').value = mapping.timestamp_column || 'updated_at';

    var sm = db.schema_mappings || {};
    document.getElementById('output_db_schema_mappings_enabled').checked = sm.enabled ?? true;
    document.getElementById('output_db_schema_mappings_path').value = sm.path || 'mappings/';
    document.getElementById('output_db_schema_mappings_default_mode').value = sm.default_mode || 'jsonb';
    document.getElementById('output_db_schema_mappings_strict').checked = sm.strict || false;

    toggleOutputFields();
    toggleDbMappingFields();

    document.getElementById('checkpoint_enabled').checked = cfg.checkpoint?.enabled ?? true;
    document.getElementById('checkpoint_client_id').value = cfg.checkpoint?.client_id || '';
    document.getElementById('checkpoint_every_n_docs').value = cfg.checkpoint?.every_n_docs ?? 0;

    document.getElementById('metrics_enabled').checked = cfg.metrics?.enabled ?? true;
    document.getElementById('metrics_host').value = cfg.metrics?.host || '0.0.0.0';
    document.getElementById('metrics_port').value = cfg.metrics?.port ?? 9090;

    document.getElementById('logging_level').value = cfg.logging?.level || 'INFO';
  }

  // Collect form values into config object
  function collectConfig() {
    var channels = channelsTagify.value.map(function(t) { return t.value; });

    return {
      gateway: {
        src: document.getElementById('gateway_src').value,
        url: document.getElementById('gateway_url').value,
        database: document.getElementById('gateway_database').value,
        scope: document.getElementById('gateway_scope').value,
        collection: document.getElementById('gateway_collection').value,
        accept_self_signed_certs: document.getElementById('gateway_accept_self_signed_certs').checked
      },
      auth: {
        method: document.getElementById('auth_method').value,
        username: document.getElementById('auth_username').value,
        password: document.getElementById('auth_password').value,
        session_cookie: document.getElementById('auth_session_cookie').value,
        bearer_token: document.getElementById('auth_bearer_token').value
      },
      changes_feed: {
        feed_type: document.getElementById('changes_feed_feed_type').value,
        poll_interval_seconds: parseInt(document.getElementById('changes_feed_poll_interval_seconds').value) || 0,
        active_only: document.getElementById('changes_feed_active_only').checked,
        include_docs: document.getElementById('changes_feed_include_docs').checked,
        channels: channels,
        throttle_feed: parseInt(document.getElementById('changes_feed_throttle_feed').value) || 0,
        http_timeout_seconds: parseInt(document.getElementById('changes_feed_http_timeout_seconds').value) || 300
      },
      processing: {
        ignore_delete: document.getElementById('processing_ignore_delete').checked,
        ignore_remove: document.getElementById('processing_ignore_remove').checked,
        sequential: document.getElementById('processing_sequential').checked,
        max_concurrent: parseInt(document.getElementById('processing_max_concurrent').value) || 20,
        dry_run: document.getElementById('processing_dry_run').checked
      },
      output: (function() {
        var mode = document.getElementById('output_mode').value;
        var o = {
          mode: mode,
          halt_on_failure: document.getElementById('output_halt_on_failure').checked
        };
        if (mode === 'http') {
          o.target_url = document.getElementById('output_target_url').value;
          o.output_format = document.getElementById('output_output_format').value;
        }
        if (mode === 'db') {
          var mappingMode = document.getElementById('output_db_mapping_mode').value;
          var dbCfg = {
            engine: document.getElementById('output_db_engine').value,
            host: document.getElementById('output_db_host').value,
            port: parseInt(document.getElementById('output_db_port').value) || null,
            database: document.getElementById('output_db_database').value,
            username: document.getElementById('output_db_username').value,
            password: document.getElementById('output_db_password').value,
            schema: document.getElementById('output_db_schema').value,
            table: document.getElementById('output_db_table').value,
            ssl: document.getElementById('output_db_ssl').checked,
            pool_size: parseInt(document.getElementById('output_db_pool_size').value) || 5,
            connect_timeout_seconds: parseInt(document.getElementById('output_db_connect_timeout').value) || 10,
            mapping: { mode: mappingMode }
          };
          if (mappingMode === 'jsonb') {
            dbCfg.mapping.doc_id_column = document.getElementById('output_db_doc_id_column').value || 'doc_id';
            dbCfg.mapping.rev_column = document.getElementById('output_db_rev_column').value || 'rev';
            dbCfg.mapping.body_column = document.getElementById('output_db_body_column').value || 'body';
            dbCfg.mapping.timestamp_column = document.getElementById('output_db_timestamp_column').value || 'updated_at';
          }
          if (mappingMode === 'columns') {
            dbCfg.schema_mappings = {
              enabled: document.getElementById('output_db_schema_mappings_enabled').checked,
              path: document.getElementById('output_db_schema_mappings_path').value || 'mappings/',
              default_mode: document.getElementById('output_db_schema_mappings_default_mode').value,
              strict: document.getElementById('output_db_schema_mappings_strict').checked
            };
          }
          o.db = dbCfg;
        }
        return o;
      })(),
      checkpoint: {
        enabled: document.getElementById('checkpoint_enabled').checked,
        client_id: document.getElementById('checkpoint_client_id').value,
        every_n_docs: parseInt(document.getElementById('checkpoint_every_n_docs').value) || 0
      },
      metrics: {
        enabled: document.getElementById('metrics_enabled').checked,
        host: document.getElementById('metrics_host').value,
        port: parseInt(document.getElementById('metrics_port').value) || 9090
      },
      logging: {
        level: document.getElementById('logging_level').value
      }
    };
  }

  // Load config from server
  async function loadConfig() {
    try {
      var res = await fetch('/api/config');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var cfg = await res.json();
      populateForm(cfg);
      document.getElementById('rawJson').value = JSON.stringify(cfg, null, 2);
      showToast('Config loaded', 'success');
    } catch (err) {
      showToast('Failed to load config: ' + err.message, 'error');
    }
  }

  // Save config to server
  async function saveConfig() {
    var cfg;
    var rawView = document.getElementById('viewRaw');
    if (!rawView.classList.contains('hidden')) {
      try {
        cfg = JSON.parse(document.getElementById('rawJson').value);
      } catch (e) {
        showToast('Invalid JSON: ' + e.message, 'error');
        return;
      }
    } else {
      cfg = collectConfig();
    }

    try {
      var res = await fetch('/api/config', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(cfg)
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      showToast('Config saved successfully', 'success');
    } catch (err) {
      showToast('Failed to save config: ' + err.message, 'error');
    }
  }

  // Initialize Tagify on Channels input
  var channelsInput = document.getElementById('changes_feed_channels');
  var channelsTagify = new Tagify(channelsInput, {
    delimiters: ',| |Enter',
    trim: true,
    duplicates: false,
    placeholder: 'Type a channel and press Enter'
  });

  // Load on page init
  loadConfig();
</script>

</body>
</html>
